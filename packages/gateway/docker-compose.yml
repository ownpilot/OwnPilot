# OwnPilot - Full Stack Docker Compose
# Usage: docker-compose up -d

version: '3.8'

services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ownpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ownpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ownpilot}
      POSTGRES_DB: ${POSTGRES_DB:-ownpilot}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./packages/gateway/src/db/migrations/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ownpilot-network

  # ==========================================================================
  # MQTT Broker (Mosquitto)
  # ==========================================================================
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ownpilot-mosquitto
    restart: unless-stopped
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
    ports:
      - '${MQTT_PORT:-1883}:1883'
      - '${MQTT_WS_PORT:-9001}:9001'
    networks:
      - ownpilot-network

  # ==========================================================================
  # OwnPilot Gateway
  # ==========================================================================
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ownpilot-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-ownpilot}:${POSTGRES_PASSWORD:-ownpilot}@postgres:5432/${POSTGRES_DB:-ownpilot}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    ports:
      - '${GATEWAY_PORT:-8080}:8080'
      - '${WS_PORT:-18789}:18789'
    volumes:
      - gateway-data:/app/.data
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:8080/api/v1/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - ownpilot-network

  # ==========================================================================
  # Optional: PGAdmin for database management
  # ==========================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ownpilot-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ownpilot.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - ownpilot-network
    profiles:
      - tools

volumes:
  postgres-data:
  mosquitto-data:
  gateway-data:
  pgadmin-data:

networks:
  ownpilot-network:
    driver: bridge
