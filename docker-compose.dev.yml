# docker-compose.dev.yml — Development configuration
#
# Code is mounted via volumes — changes apply on save (hot reload).
# node_modules live INSIDE the container (named volumes) — never on host.
#
# Usage:
#   docker compose -f docker-compose.dev.yml --profile postgres up -d   # start all (gateway + postgres)
#   docker compose -f docker-compose.dev.yml up -d                      # gateway only (external DB)
#   docker compose -f docker-compose.dev.yml restart gateway             # apply code changes (if hot reload misses)
#   docker compose -f docker-compose.dev.yml build gateway               # ONLY when deps change (package.json / pnpm-lock.yaml)
#   docker compose -f docker-compose.dev.yml --profile lightrag up -d   # with LightRAG
#   docker compose -f docker-compose.dev.yml logs -f gateway             # follow logs

services:
  # ── PostgreSQL (pgvector) ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ownpilot-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-25432}:5432'
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-ownpilot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ownpilot_secret}
      - POSTGRES_DB=${POSTGRES_DB:-ownpilot}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./packages/gateway/src/db/migrations/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ownpilot} -d ${POSTGRES_DB:-ownpilot}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ownpilot-network
    profiles:
      - postgres

  # ── Gateway (API + UI, hot reload via tsx watch) ──────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ownpilot
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      # - '${PORT:-8080}:8080'
      - '8501:8080'
    environment:
      - NODE_ENV=development
      - PORT=8080
      - HOST=0.0.0.0
      - OWNPILOT_DATA_DIR=/app/data
      # Database
      - DATABASE_URL=${DATABASE_URL:-}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-ownpilot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ownpilot_secret}
      - POSTGRES_DB=${POSTGRES_DB:-ownpilot}
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # Auth & Security
      - AUTH_TYPE=${AUTH_TYPE:-none}
      - API_KEYS=${API_KEYS:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      # Rate Limiting
      - RATE_LIMIT_DISABLED=${RATE_LIMIT_DISABLED:-true}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-500}
      # MQTT (Edge Delegation)
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      # LightRAG (Graph RAG — optional, requires lightrag profile)
      - LIGHTRAG_URL=${LIGHTRAG_URL:-http://lightrag:9621}
      - LIGHTRAG_API_KEY=${LIGHTRAG_API_KEY:-ownpilot-lightrag-key}
    volumes:
      # Source code — mounted for hot reload (tsx watch picks up changes)
      - ./packages/core/src:/app/packages/core/src:ro
      - ./packages/core/data:/app/packages/core/data:ro
      - ./packages/core/tsconfig.json:/app/packages/core/tsconfig.json:ro
      - ./packages/gateway/src:/app/packages/gateway/src:ro
      - ./packages/gateway/data:/app/packages/gateway/data:ro
      - ./packages/gateway/tsconfig.json:/app/packages/gateway/tsconfig.json:ro
      - ./packages/cli/src:/app/packages/cli/src:ro
      - ./packages/cli/tsconfig.json:/app/packages/cli/tsconfig.json:ro
      - ./tsconfig.base.json:/app/tsconfig.base.json:ro
      - ./turbo.json:/app/turbo.json:ro
      # Tests directory
      - ./tests:/app/tests:ro
      # Persistent data
      - gateway-data:/app/data
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ownpilot-network
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  # ── LightRAG (Graph RAG — optional) ──────────────────────────────────
  lightrag:
    image: ghcr.io/hkuds/lightrag:latest
    container_name: ownpilot-lightrag
    restart: unless-stopped
    ports:
      - '${LIGHTRAG_PORT:-9621}:9621'
    environment:
      - HOST=0.0.0.0
      - PORT=9621
      - WORKING_DIR=/data/rag_storage
      - INPUT_DIR=/data/inputs
      - LLM_BINDING=${LIGHTRAG_LLM_BINDING:-openai}
      - LLM_BINDING_HOST=${LIGHTRAG_LLM_HOST:-https://api.openai.com/v1}
      - LLM_MODEL=${LIGHTRAG_LLM_MODEL:-gpt-4.1-nano}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - EMBEDDING_BINDING=${LIGHTRAG_EMBEDDING_BINDING:-openai}
      - EMBEDDING_BINDING_HOST=${LIGHTRAG_EMBEDDING_HOST:-https://api.openai.com/v1}
      - EMBEDDING_MODEL=${LIGHTRAG_EMBEDDING_MODEL:-text-embedding-3-small}
      - LIGHTRAG_KV_STORAGE=JsonKVStorage
      - LIGHTRAG_GRAPH_STORAGE=NetworkXStorage
      - LIGHTRAG_CHUNK_TOKEN_SIZE=1200
      - LIGHTRAG_CHUNK_OVERLAP_TOKEN_SIZE=100
      - LIGHTRAG_ENABLE_LLM_CACHE=true
      - LIGHTRAG_API_KEY=${LIGHTRAG_API_KEY:-ownpilot-lightrag-key}
      - SUMMARY_LANGUAGE=${LIGHTRAG_LANGUAGE:-the same language as the source document}
    volumes:
      - lightrag-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'python3 -c "import urllib.request; urllib.request.urlopen(\"http://localhost:9621/health\")" || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ownpilot-network
    profiles:
      - lightrag

  # ── Host-loopback proxy (local AI servers) ───────────────────────────
  # Local AI servers (LM Studio, Ollama, etc.) often bind to 127.0.0.1
  # which Docker containers can't reach via host.docker.internal.
  # This container runs on the host network and binds to 0.0.0.0 on each
  # configured port (SO_REUSEADDR — coexists with the loopback-only
  # server on 127.0.0.1).  Gateway connects via host.docker.internal on
  # the *same* port — no port offsets, no host modifications.
  #
  # Usage:
  #   LOCAL_AI_PORTS=1234,11434 docker compose -f docker-compose.dev.yml --profile local-ai up -d
  host-proxy:
    image: alpine/socat:latest
    container_name: ownpilot-host-proxy
    restart: unless-stopped
    network_mode: host
    entrypoint: /bin/sh
    command:
      - -c
      - |
        PORTS="$${LOCAL_AI_PORTS:-1234}"
        # Bind to all Docker bridge IPs (172.x.x.1) — does not conflict
        # with servers on 127.0.0.1 and lets gateway reach them via
        # host.docker.internal.
        BRIDGE_IPS=$$(ip -4 addr show | sed -n 's|.*inet \(172\.[0-9]*\.[0-9]*\.1\)/.*|\1|p')
        if [ -z "$$BRIDGE_IPS" ]; then
          echo "[host-proxy] ERROR: no docker bridge IPs found"; exit 1
        fi
        echo "[host-proxy] bridge IPs: $$BRIDGE_IPS"
        echo "[host-proxy] ports: $$PORTS"
        for port in $$(echo "$$PORTS" | tr ',' ' '); do
          for ip in $$BRIDGE_IPS; do
            socat TCP-LISTEN:$$port,fork,reuseaddr,bind=$$ip TCP:127.0.0.1:$$port &
            echo "  ✓ $$ip:$$port → 127.0.0.1:$$port"
          done
        done
        wait
    environment:
      - LOCAL_AI_PORTS=${LOCAL_AI_PORTS:-1234}
    profiles:
      - local-ai

  # ── Mosquitto MQTT (Edge Delegation — optional) ──────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ownpilot-mosquitto
    restart: unless-stopped
    ports:
      - '${MQTT_PORT:-1883}:1883'
      - '${MQTT_WS_PORT:-9001}:9001'
    volumes:
      - ./packages/gateway/docker/mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - ownpilot-network
    profiles:
      - mqtt

volumes:
  gateway-data:
    driver: local
  postgres-data:
    driver: local
  lightrag-data:
    driver: local
  mosquitto-data:
    driver: local
  mosquitto-log:
    driver: local

networks:
  ownpilot-network:
    driver: bridge
