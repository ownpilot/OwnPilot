services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ownpilot-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-25432}:5432'
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-ownpilot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ownpilot_secret}
      - POSTGRES_DB=${POSTGRES_DB:-ownpilot}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./packages/gateway/src/db/migrations/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ownpilot} -d ${POSTGRES_DB:-ownpilot}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ownpilot-network
    profiles:
      - postgres

  # OwnPilot (API + UI in a single container)
  # To use pre-built image instead of local build:
  # image: ghcr.io/ownpilot/ownpilot:latest
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: ownpilot
    restart: unless-stopped
    ports:
      - '${PORT:-8080}:8080'
    environment:
      - NODE_ENV=production
      - PORT=8080
      - HOST=0.0.0.0
      - OWNPILOT_DATA_DIR=/app/data
      # Database (always connects to the postgres service inside Docker network)
      - DATABASE_URL=${DATABASE_URL:-}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-ownpilot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ownpilot_secret}
      - POSTGRES_DB=${POSTGRES_DB:-ownpilot}
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # Auth & Security
      - AUTH_TYPE=${AUTH_TYPE:-none}
      - API_KEYS=${API_KEYS:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - WS_ALLOWED_ORIGINS=${WS_ALLOWED_ORIGINS:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      # Rate Limiting
      - RATE_LIMIT_DISABLED=${RATE_LIMIT_DISABLED:-false}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-500}
      # MQTT (Edge Delegation)
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - gateway-data:/app/data
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ownpilot-network
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  # Ollama Local AI Server (gemma3:1b ~2GB RAM)
  ollama:
    image: ollama/ollama:latest
    container_name: ownpilot-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ownpilot-network
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    profiles:
      - ollama

  # Pull gemma3:1b on first start (exits after pull completes)
  ollama-setup:
    image: ollama/ollama:latest
    container_name: ownpilot-ollama-setup
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ['ollama', 'pull', 'qwen2.5:1.5b']
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - ownpilot-network
    profiles:
      - ollama
    restart: 'no'

  # Register Ollama as local provider in OwnPilot (exits after registration)
  ollama-register:
    image: curlimages/curl:latest
    container_name: ownpilot-ollama-register
    depends_on:
      ollama-setup:
        condition: service_completed_successfully
      gateway:
        condition: service_healthy
    networks:
      - ownpilot-network
    profiles:
      - ollama
    restart: 'no'
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        RESP=$(curl -sf -X POST http://gateway:8080/api/v1/local-providers \
          -H 'Content-Type: application/json' \
          -d '{"name":"Ollama","providerType":"ollama","baseUrl":"http://ollama:11434","discoveryEndpoint":"/api/tags"}' || echo '{}')
        ID=$(echo "$RESP" | grep -o '"id":"[^"]*"' | head -1 | sed 's/"id":"//;s/"//')
        [ -n "$ID" ] && curl -sf -X POST "http://gateway:8080/api/v1/local-providers/$ID/discover" || true

  # Eclipse Mosquitto MQTT Broker (for Edge Delegation)
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ownpilot-mosquitto
    restart: unless-stopped
    ports:
      - '${MQTT_PORT:-1883}:1883'
      - '${MQTT_WS_PORT:-9001}:9001'
    volumes:
      - ./packages/gateway/docker/mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - ownpilot-network
    profiles:
      - mqtt

volumes:
  gateway-data:
    driver: local
  postgres-data:
    driver: local
  ollama-data:
    driver: local
  mosquitto-data:
    driver: local
  mosquitto-log:
    driver: local

networks:
  ownpilot-network:
    driver: bridge
